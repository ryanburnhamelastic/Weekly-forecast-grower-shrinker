<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <div class="app-container">
    <div id="header">
      <h2>Weekly Forecast Notes</h2>
      <div id="user-info"></div>
    </div>

  <div id="week-selector">
    <label>Select Week:</label>
    <select id="week-dropdown"></select>
    <button id="refresh-btn" title="Refresh data">↻</button>
  </div>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <p>Loading accounts...</p>
  </div>

  <div id="main-content" class="hidden">
    <div class="sections-container">
      <div id="growers-section" class="section">
        <h3 class="section-header growers">
          📈 Growers (<span id="growers-count">0</span>)
        </h3>
        <div id="growers-list" class="accounts-list"></div>
      </div>

      <div id="shrinkers-section" class="section">
        <h3 class="section-header shrinkers">
          📉 Shrinkers (<span id="shrinkers-count">0</span>)
        </h3>
        <div id="shrinkers-list" class="accounts-list"></div>
      </div>
    </div>

    <div id="empty-state" class="hidden">
      <p>No accounts assigned to you this week.</p>
    </div>
  </div>

  <div id="error-state" class="hidden">
    <p class="error-message"></p>
  </div>

  <div id="footer">
    <p class="help-text">Click "Edit" to add or modify notes.</p>
  </div>
  </div><!-- end app-container -->
